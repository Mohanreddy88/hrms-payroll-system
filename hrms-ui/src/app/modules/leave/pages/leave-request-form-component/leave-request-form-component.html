<div class="leave-request-form-page">

  <div class="page-header">
    <div>
      <h3>New Leave Request</h3>
      <p>Submit a new leave request</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-back" (click)="backToHome()">
        <i class="bi bi-house"></i>
        Home
      </button>
    </div>
  </div>

  <div class="form-card">
    <form (ngSubmit)="submitRequest()">
      
      <div class="form-group">
        <label>Employee <span class="required">*</span></label>
        <select [(ngModel)]="employeeId" name="employeeId" [disabled]="!isAdmin" required>
          <option [ngValue]="null">-- Select Employee --</option>
          @for (emp of employees; track emp.id) {
            <option [ngValue]="emp.id">{{ emp.employeeCode }} - {{ emp.name }}</option>
          }
        </select>
        @if (!isAdmin) {
          <small class="form-text text-muted">
            You are submitting this request for yourself
            @if (employeeId) {
              <strong>(Employee ID: {{ employeeId }})</strong>
            } @else {
              <strong class="text-danger">(NOT AUTO-SELECTED - CHECK CONSOLE)</strong>
            }
          </small>
        }
      </div>

      <div class="form-group">
        <label>Leave Type <span class="required">*</span></label>
        <select [(ngModel)]="leaveTypeId" name="leaveTypeId" required>
          <option [ngValue]="null">-- Select Leave Type --</option>
          @for (lt of leaveTypes; track lt.id) {
            <option [ngValue]="lt.id">{{ lt.name }} ({{ lt.code }})</option>
          }
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Start Date <span class="required">*</span></label>
          <input 
            type="date" 
            [(ngModel)]="startDate" 
            name="startDate" 
            (ngModelChange)="onDateChange()"
            required>
        </div>

        <div class="form-group">
          <label>End Date <span class="required">*</span></label>
          <input 
            type="date" 
            [(ngModel)]="endDate" 
            name="endDate" 
            (ngModelChange)="onDateChange()"
            required>
        </div>
      </div>

      @if (totalDays > 0) {
        <div class="total-days-display">
          <i class="bi bi-calendar-range me-2"></i>
          Total Days: <strong>{{ totalDays }}</strong> day(s)
        </div>
      }

      <div class="form-group">
        <label>Reason <span class="required">*</span></label>
        <textarea 
          [(ngModel)]="reason" 
          name="reason" 
          rows="4" 
          placeholder="Please provide a reason for your leave request..."
          required>
        </textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="loading">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          @if (loading) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          Submit Request
        </button>
      </div>

    </form>
  </div>

</div>
