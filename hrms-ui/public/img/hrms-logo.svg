<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="150" cy="150" r="145" fill="#4F46E5" opacity="0.1"/>
  <circle cx="150" cy="150" r="130" fill="#4F46E5" opacity="0.05"/>
  
  <!-- Main Icon - People/Team -->
  <g transform="translate(75, 80)">
    <!-- Person 1 - Left -->
    <circle cx="30" cy="35" r="18" fill="#4F46E5"/>
    <path d="M 10 90 Q 10 60 30 60 Q 50 60 50 90 L 50 110 L 10 110 Z" fill="#4F46E5"/>
    
    <!-- Person 2 - Center (slightly higher) -->
    <circle cx="75" cy="28" r="22" fill="#6366F1"/>
    <path d="M 48 95 Q 48 60 75 60 Q 102 60 102 95 L 102 120 L 48 120 Z" fill="#6366F1"/>
    
    <!-- Person 3 - Right -->
    <circle cx="120" cy="35" r="18" fill="#4F46E5"/>
    <path d="M 100 90 Q 100 60 120 60 Q 140 60 140 90 L 140 110 L 100 110 Z" fill="#4F46E5"/>
  </g>
  
  <!-- Document/Clipboard Icon -->
  <g transform="translate(200, 100)">
    <rect x="0" y="0" width="50" height="65" rx="4" fill="white" stroke="#4F46E5" stroke-width="3"/>
    <rect x="15" y="-8" width="20" height="12" rx="2" fill="#4F46E5"/>
    <line x1="10" y1="20" x2="40" y2="20" stroke="#4F46E5" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="32" x2="40" y2="32" stroke="#4F46E5" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="44" x2="35" y2="44" stroke="#4F46E5" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- HRMS Text -->
  <text x="150" y="235" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#1F2937" text-anchor="middle">HRMS</text>
  <text x="150" y="260" font-family="Arial, sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">Human Resource Management</text>
</svg>
