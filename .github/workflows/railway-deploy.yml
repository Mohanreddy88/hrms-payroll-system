name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Railway
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Railway
        run: |
          echo "Code pushed to main branch"
          echo "Railway will auto-deploy via GitHub integration"
          echo "Monitor deployment at: https://railway.com/project/311e929d-521f-401d-a6e6-981c0e599282"

      - name: ✅ Deployment Triggered
        run: |
          echo "Deployment triggered successfully"
          echo "Check Railway dashboard for progress"
